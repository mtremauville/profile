<svg fill="none" viewBox="0 0 600 400" width="600" height="400" xmlns="http://www.w3.org/2000/svg">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
}

.body{
  height:400px;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  /* background:#050505; Noir profond */
  /* BORDURE BLEUE RETIRÉE ICI */
  position: relative;
  overflow: hidden;
}

.container{
  width:80%;
  max-width:520px;
  position: relative;
  z-index: 1; 
}

.terminal{
  background: rgba(31, 41, 55, 0.95); /* Presque opaque */
  color: #FFFFFF;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);

  /* --- LA LUEUR SÉLECTIVE (toujours présente) --- */
  box-shadow: 
    0 0 15px rgba(37, 99, 235, 0.5),   /* Lueur bleue interne/proche */
    0 0 30px rgba(168, 85, 247, 0.4),  /* Lueur violette moyenne */
    0 0 45px rgba(236, 72, 153, 0.3);  /* Lueur rose externe/lointaine */
  
  /* Animation de la lueur pour un effet "pulsation" discret */
  animation: siriPulse 4s ease-in-out infinite;
}

.terminal-header{
  height:32px;
  background: rgba(45, 55, 72, 0.95);
  display:flex;
  align-items:center;
  padding-left:12px;
  gap:8px;
}

.circle{ width:12px; height:12px; border-radius:50%; }
.red{ background:#FF5F56; }
.yellow{ background:#FFBD2E; }
.green-dot{ background:#27C93F; }

.terminal-body{ padding:30px; }

.line{
  font-size:18px;
  margin-bottom:10px;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation: typing 2s steps(30,end) forwards;
}

.line:nth-child(2){ animation-delay: 2s; }
.line:nth-child(3){ 
  animation-delay: 4s; 
  display: flex;
  align-items: center;
}

.text-green{ color: #27C93F; font-weight: bold; }

@keyframes typing{
  from{ width: 0; }
  to{ width: 100%; }
}

@keyframes blink{
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Animation de pulsation discrète pour la lueur */
@keyframes siriPulse {
  0%, 100% {
    box-shadow: 
      0 0 15px rgba(37, 99, 235, 0.5),
      0 0 30px rgba(168, 85, 247, 0.4),
      0 0 45px rgba(236, 72, 153, 0.3);
  }
  50% {
    box-shadow: 
      0 0 20px rgba(37, 99, 235, 0.6),
      0 0 40px rgba(168, 85, 247, 0.5),
      0 0 60px rgba(236, 72, 153, 0.4);
  }
}
  
.cursor{
  display:inline-block;
  width:10px;
  height:20px;
  background: #27C93F;
  margin-left:5px;
  animation: blink 1s step-end infinite;
}
</style>

<div class="body">
  <div class="container">
    <div class="terminal">
      <div class="terminal-header">
        <div class="circle red"></div>
        <div class="circle yellow"></div>
        <div class="circle green-dot"></div>
      </div>

      <div class="terminal-body">
        <div class="line">$ whoami</div>
        <div class="line">Mickael Tremauville</div>
        <div class="line">
          <span class="text-green">Junior AI Software Engineer</span>
          <span class="cursor"></span>
        </div>
      </div>
    </div>
  </div>
</div>

</div>
</foreignObject>
</svg>
