<svg fill="none" viewBox="0 0 600 400" width="600" height="400" xmlns="http://www.w3.org/2000/svg">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
}

.body{
  height:400px;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  /* background:#020202; Noir très profond pour le contraste maximal */
  position: relative;
  overflow: hidden;
}

.container{
  width:80%;
  max-width:520px;
  position: relative;
  z-index: 1; 
}

.terminal{
  background: rgba(17, 24, 39, 0.95); /* Sombre et presque opaque */
  color: #FFFFFF;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);

  /* --- L'EFFET NÉON "GLOWTIME" AVEC ROSE RÉDUIT (AJUSTÉ) --- */
  /* Superposition d'ombres : du blanc brillant au cœur vers les couleurs diffuses */
  box-shadow: 
    0 0 5px #FFFFFF,      /* Le cœur blanc brillant */
    0 0 10px #FFFFFF,     /* Deuxième couche de blanc pour l'intensité */
    0 0 20px #2563EB,    /* Lueur bleue proche (dominante) */
    0 0 35px #a855f7,    /* Lueur violette moyenne */
    0 0 45px rgba(236, 72, 153, 0.2);  /* --- ROSE RÉDUIT ET SUBTIL --- */
  
  /* Animation de pulsation discrète pour l'effet néon vivant */
  animation: neonPulse 3s ease-in-out infinite;
}

.terminal-header{
  height:32px;
  background: #1f2937;
  display:flex;
  align-items:center;
  padding-left:12px;
  gap:8px;
}

.circle{ width:12px; height:12px; border-radius:50%; }
.red{ background:#FF5F56; }
.yellow{ background:#FFBD2E; }
.green-dot{ background:#27C93F; }

.terminal-body{ padding:30px; }

.line{
  font-size:18px;
  margin-bottom:10px;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation: typing 2s steps(30,end) forwards;
}

.line:nth-child(2){ animation-delay: 2s; }
.line:nth-child(3){ 
  animation-delay: 4s; 
  display: flex;
  align-items: center;
}

.text-green{ color: #27C93F; font-weight: bold; }

@keyframes typing{ from{ width: 0; } to{ width: 100%; } }
@keyframes blink{ 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* Animation de pulsation pour l'effet néon */
@keyframes neonPulse {
  0%, 100% {
    box-shadow: 
      0 0 5px #FFFFFF,
      0 0 10px #FFFFFF,
      0 0 20px #2563EB,
      0 0 35px #a855f7,
      0 0 45px rgba(236, 72, 153, 0.2);
  }
  50% {
    box-shadow: 
      0 0 7px #FFFFFF,
      0 0 15px #FFFFFF,
      0 0 25px #2563EB,
      0 0 40px #a855f7,
      0 0 55px rgba(236, 72, 153, 0.3);
  }
}
  
.cursor{
  display:inline-block;
  width:10px;
  height:20px;
  background: #27C93F;
  margin-left:5px;
  animation: blink 1s step-end infinite;
}
</style>

<div class="body">
  
  <div class="container">
    <div class="terminal">
      <div class="terminal-header">
        <div class="circle red"></div>
        <div class="circle yellow"></div>
        <div class="circle green-dot"></div>
      </div>

      <div class="terminal-body">
        <div class="line">$ whoami</div>
        <div class="line">Mickael Tremauville</div>
        <div class="line">
          <span class="text-green">Junior AI Software Engineer</span>
          <span class="cursor"></span>
        </div>
      </div>
    </div>
  </div>
</div>

</div>
</foreignObject>
</svg>
