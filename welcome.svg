<svg fill="none" viewBox="0 0 600 400" width="600" height="400" xmlns="http://www.w3.org/2000/svg">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
}

.body{
  --blue:#2563EB;
  --gray:#1F2937;
  --white:#FFFFFF;
  --terminal-green:#27C93F;

  height:400px;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000000;
  border:8px solid var(--blue);
  
  /* Ajout de la lueur néon Siri */
  position: relative;
  overflow: hidden;
}

/* L'élément pour l'effet de lueur */
.siri-glow {
  position: absolute;
  width: 200%;
  height: 200%;
  border-radius: 50%;
  
  /* Dégradé radial animé pour l'effet mouvant */
  background: radial-gradient(
    circle at center, 
    #2563EB 0%,     /* Bleu au centre */
    #1F2937 30%,    /* Gris */
    #000000 60%     /* Noir sur les bords */
  );
  
  /* Floutage pour la lueur */
  filter: blur(40px);
  
  /* Animation du mouvement */
  animation: siriMove 10s ease-in-out infinite;
  
  /* Assurer que l'élément est derrière le terminal */
  z-index: -1;
}

.container{
  width:80%;
  max-width:520px;
  
  /* Pour que le terminal soit bien par-dessus la lueur */
  position: relative;
  z-index: 1;
}

.terminal{
  background:var(--gray);
  color:var(--white);
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  
  /* Pour l'effet de flou subtil sur le terminal */
  backdrop-filter: blur(5px); 
}

.terminal-header{
  height:32px;
  background:#2d3748;
  display:flex;
  align-items:center;
  padding-left:12px;
  gap:8px;
}

.circle{
  width:12px;
  height:12px;
  border-radius:50%;
}

.red{ background:#FF5F56; }
.yellow{ background:#FFBD2E; }
.green-dot{ background:#27C93F; }

.terminal-body{
  padding:30px;
}

.line{
  font-size:18px;
  margin-bottom:10px;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation:typing 2s steps(30,end) forwards;
}

.line:nth-child(2){ animation-delay:2s; }
.line:nth-child(3){ 
  animation-delay:4s; 
  display: flex;
  align-items: center;
}

/* Couleur verte pour le texte */
.text-green{
  color: var(--terminal-green);
}

@keyframes typing{
  from{width:0}
  to{width:100%}
}

/* Animation de clignotement par opacité */
@keyframes blink{
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Animation du mouvement de la lueur Siri */
@keyframes siriMove {
  0%, 100% {
    transform: translate(-25%, -25%) rotate(0deg);
  }
  25% {
    transform: translate(-25%, -10%) rotate(5deg);
  }
  50% {
    transform: translate(-10%, -25%) rotate(-5deg);
  }
  75% {
    transform: translate(-10%, -10%) rotate(0deg);
  }
}
  
.cursor{
  display:inline-block;
  width:10px;
  height:20px;
  background: var(--terminal-green);
  margin-left:5px;
  animation: blink 1s step-end infinite;
}
</style>

<div class="body">
  <div class="siri-glow"></div>
  
  <div class="container">
    <div class="terminal">
      <div class="terminal-header">
        <div class="circle red"></div>
        <div class="circle yellow"></div>
        <div class="circle green-dot"></div>
      </div>

      <div class="terminal-body">
        <div class="line">$ whoami</div>
        <div class="line">Mickael Tremauville</div>
        <div class="line">
          <span class="text-green">Junior AI Software Engineer</span>
          <span class="cursor"></span>
        </div>
      </div>
    </div>
  </div>
</div>

</div>
</foreignObject>
</svg>
